<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSAI 今日新闻</title>
</head>
<body>
    <h1>MSAI 今日新闻</h1>
    <div id="news-container">
        <!-- 新闻内容会在这里动态加载 -->
    </div>
    <script>
        // 模拟从 GitHub Pages 后端获取新闻内容
        const newsData = [
            {
                title: "特朗普支持空袭伊朗能源设施",
                link: "https://www.chinanews.com.cn/gj/2026/03-19/10589173.shtml",
                summary: "伊朗能源设施被空袭，局势进一步紧张。"
            },
            {
                title: "美方或向中东增派数千兵力",
                link: "https://www.chinanews.com.cn/gj/2026/03-19/10589194.shtml",
                summary: "美国考虑在中东部署数千军人，冲突或升级。"
            },
            {
                title: "内蒙古阿拉善车间爆炸致2失联",
                link: "https://www.chinanews.com.cn/gj/2026/03-19/10589213.shtml",
                summary: "阿拉善车间爆炸，2人失联、3人受伤。"
            }
        ];

        // 动态加载新闻内容
        const newsContainer = document.getElementById("news-container");
        newsData.forEach(news => {
            const newsElement = document.createElement("div");
            newsElement.innerHTML = `
                <h2><a href="${news.link}" target="_blank">${news.title}</a></h2>
                <p>${news.summary}</p>
            `;
            newsContainer.appendChild(newsElement);
        });
    </script>
</body>
</html>
