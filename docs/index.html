<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSAI今日新闻</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei";
      background: #f5f6f8;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5bd7);
      color: white;
      padding: 24px;
      border-radius: 0 0 24px 24px;
    }

    .hero h1 {
      font-size: 22px;
      line-height: 1.4;
      margin: 0 0 10px 0;
    }

    .hero p {
      font-size: 14px;
      opacity: 0.85;
    }

    .section {
      background: white;
      margin: 16px;
      border-radius: 16px;
      padding: 16px;
    }

    .section-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .news-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .news-title {
      font-weight: bold;
      font-size: 16px;
    }

    .news-summary {
      color: #666;
      font-size: 14px;
      margin-top: 6px;
    }

    .link {
      float: right;
      text-decoration: none;
      color: #2a5bd7;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: #eef2ff;
      color: #2a5bd7;
      border-radius: 8px;
      font-size: 12px;
      margin-left: 6px;
    }

  </style>
</head>

<body>
<div class="container">

  <div class="hero">
    <h1 id="title">MSAI今日新闻</h1>
    <p>自动聚合 · AI热点判断 · 多源中文资讯</p>
  </div>

  <div class="section">
    <div class="section-title">关键热点</div>
    <div id="hotspots"></div>
  </div>

  <div class="section">
    <div class="section-title">新闻正文</div>
    <div id="news"></div>
  </div>

  <div class="section">
    <div class="section-title">期货观察</div>
    <div id="futures"></div>
  </div>

</div>

<script>
fetch("./news-data.json")
  .then(res => res.json())
  .then(data => {

    document.getElementById("title").innerText = data.title;

    // ===== 热点 =====
    let hotspotsHtml = "";
    data.hotspots.forEach(item => {
      hotspotsHtml += `
        <div class="news-item">
          <div class="news-title">${item.title}</div>
          <div class="news-summary">${item.summary || ""}</div>
        </div>
      `;
    });
    document.getElementById("hotspots").innerHTML = hotspotsHtml;

    // ===== 新闻 =====
    let newsHtml = "";
    data.news_items.forEach((item, index) => {
      newsHtml += `
        <div class="news-item">
          <div class="news-title">
            ${index + 1}. ${item.title}
            <a class="link" href="${item.link}" target="_blank">🔗</a>
          </div>
          <div class="news-summary">${item.summary || ""}</div>
        </div>
      `;
    });
    document.getElementById("news").innerHTML = newsHtml;

    // ===== 期货 =====
    let futuresHtml = "";
    data.futures.forEach(item => {
      let trendIcon = "";

      if (item.trend === "up") trendIcon = "📈";
      else if (item.trend === "down") trendIcon = "📉";
      else trendIcon = "➖";

      futuresHtml += `
        <div class="news-item">
          <div class="news-title">
            ${item.name} ${item.price} ${trendIcon}
          </div>
        </div>
      `;
    });
    document.getElementById("futures").innerHTML = futuresHtml;

  })
  .catch(err => {
    document.getElementById("news").innerHTML =
      "❌ 数据加载失败";
    console.error(err);
  });
</script>

</body>
</html>
