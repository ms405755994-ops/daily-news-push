name: Daily News Radar

on:
  schedule:
    # 北京时间 08:30（UTC 00:30）
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # ✅ 1. 生成新闻数据
      - name: Generate News
        run: |
          python news_bot.py
        env:
          NEWS_DATA_KEY: ${{ secrets.NEWS_DATA_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}

          MAX_FETCH_PER_API: 40
          MAX_FETCH_PER_RSS: 25
          MAX_NEWS: 12

          REPORT_CITY: 汕头
          REPORT_LUNAR_TEXT: 农历二月初一
          NEWS_PAGE_URL: https://ms405755994-ops.github.io/daily-news-push/

      # ✅ 2. 自动生成封面
      - name: Generate Cover
        run: |
          python generate_cover.py

      # ✅ 3. 推送公众号（只执行一次）
      - name: Publish WeChat Official Account
        run: |
          python wechat_publisher.py
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}

      # ✅ 4. 提交 JSON 到 GitHub Pages
      - name: Commit generated page data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/news-data.json docs/cover.jpg

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update news page data"
            git push
          fi
