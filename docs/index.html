<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSAI今日新闻</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      color: #1f2937;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5bd7);
      color: white;
      padding: 24px;
      border-radius: 0 0 24px 24px;
    }

    .hero h1 {
      font-size: 22px;
      line-height: 1.5;
      margin: 0 0 10px 0;
    }

    .hero p {
      font-size: 14px;
      opacity: 0.9;
      margin: 4px 0;
    }

    .section {
      background: white;
      margin: 16px;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }

    .section-title {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 12px;
      color: #111827;
    }

    .card-link {
      display: block;
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid #eee;
      transition: transform 0.15s ease, background 0.15s ease;
      border-radius: 12px;
    }

    .card-link:last-child {
      border-bottom: none;
    }

    .card-link:active {
      transform: scale(0.995);
      background: #f8fafc;
    }

    .news-item {
      padding: 14px 0;
    }

    .news-title {
      font-weight: 700;
      font-size: 16px;
      line-height: 1.5;
      color: #374151;
    }

    .news-summary {
      color: #6b7280;
      font-size: 14px;
      margin-top: 6px;
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 10px;
      background: #eef2ff;
      color: #4f6fbf;
      border-radius: 999px;
      font-size: 12px;
    }

    .meta {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      line-height: 1.7;
    }

    .empty {
      color: #888;
      font-size: 14px;
      padding: 8px 0;
    }

    .plain-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .plain-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1 id="title">MSAI今日新闻</h1>
      <p class="meta" id="dateText">日期加载中...</p>
      <p class="meta" id="weatherText">天气加载中...</p>
      <p class="meta" id="updatedAt">更新时间加载中...</p>
    </div>

    <div class="section">
      <div class="section-title">关键热点</div>
      <div id="hotspots" class="empty">加载中...</div>
    </div>

    <div class="section">
      <div class="section-title">新闻正文</div>
      <div id="news" class="empty">加载中...</div>
    </div>

    <div class="section">
      <div class="section-title">期货观察</div>
      <div id="futures" class="empty">加载中...</div>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function findHotspotLink(hotspot, newsItems) {
      const title = (hotspot.title || "").trim();
      if (!title) return "";

      // 先精确包含匹配
      for (const item of newsItems) {
        const shortTitle = (item.short_title || "").trim();
        const summary = (item.summary || "").trim();
        if (
          shortTitle.includes(title) ||
          title.includes(shortTitle) ||
          summary.includes(title)
        ) {
          return item.link || "";
        }
      }

      // 再按前4个字模糊匹配
      const key = title.slice(0, 4);
      if (key) {
        for (const item of newsItems) {
          const shortTitle = (item.short_title || "").trim();
          const summary = (item.summary || "").trim();
          if (shortTitle.includes(key) || summary.includes(key)) {
            return item.link || "";
          }
        }
      }

      return "";
    }

    function renderClickableCard(title, summary, link, tag) {
      const safeTitle = escapeHtml(title);
      const safeSummary = escapeHtml(summary);
      const safeTag = escapeHtml(tag || "");
      const safeLink = link || "#";

      const inner = `
        <div class="news-item">
          <div class="news-title">${safeTitle}</div>
          <div class="news-summary">${safeSummary}</div>
          ${safeTag ? `<div class="tag">${safeTag}</div>` : ""}
        </div>
      `;

      if (link) {
        return `
          <a class="card-link" href="${safeLink}" target="_blank" rel="noopener noreferrer">
            ${inner}
          </a>
        `;
      }

      return `<div class="plain-item">${inner}</div>`;
    }

    fetch("./news-data.json")
      .then(res => {
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        return res.json();
      })
      .then(data => {
        document.getElementById("title").innerText = data.title || "MSAI今日新闻";
        document.getElementById("dateText").innerText = data.date_text || "";
        document.getElementById("weatherText").innerText = data.weather_text || "";
        document.getElementById("updatedAt").innerText = data.updated_at ? `更新时间：${data.updated_at}` : "";

        const newsItems = data.news_items || [];

        // 关键热点：整卡可点击
        let hotspotsHtml = "";
        (data.hotspots || []).forEach(item => {
          const hotspotLink = findHotspotLink(item, newsItems);
          hotspotsHtml += renderClickableCard(
            item.title || "",
            item.reason || "",
            hotspotLink,
            ""
          );
        });
        document.getElementById("hotspots").innerHTML = hotspotsHtml || `<div class="empty">暂无热点</div>`;

        // 新闻正文：整卡可点击
        let newsHtml = "";
        newsItems.forEach((item, index) => {
          newsHtml += renderClickableCard(
            `${index + 1}. ${item.short_title || ""}`,
            item.summary || "",
            item.link || "",
            item.category || ""
          );
        });
        document.getElementById("news").innerHTML = newsHtml || `<div class="empty">暂无新闻</div>`;

        // 期货观察
        let futuresHtml = "";
        (data.futures || []).forEach(item => {
          let trendIcon = "➖";
          if (item.trend === "up") trendIcon = "📈";
          else if (item.trend === "down") trendIcon = "📉";

          const pctText = typeof item.pct === "number" ? ` (${item.pct > 0 ? "+" : ""}${item.pct.toFixed(2)}%)` : "";
          const line = `${item.name || ""} ${item.price || ""} ${trendIcon}${pctText}`;

          if (item.history_url) {
            futuresHtml += `
              <a class="card-link" href="${item.history_url}" target="_blank" rel="noopener noreferrer">
                <div class="news-item">
                  <div class="news-title">${escapeHtml(line)}</div>
                </div>
              </a>
            `;
          } else {
            futuresHtml += `
              <div class="plain-item">
                <div class="news-item">
                  <div class="news-title">${escapeHtml(line)}</div>
                </div>
              </div>
            `;
          }
        });
        document.getElementById("futures").innerHTML = futuresHtml || `<div class="empty">暂无期货数据</div>`;
      })
      .catch(err => {
        console.error(err);
        document.getElementById("hotspots").innerHTML = `<div class="empty">❌ 数据加载失败</div>`;
        document.getElementById("news").innerHTML = `<div class="empty">❌ 数据加载失败</div>`;
        document.getElementById("futures").innerHTML = `<div class="empty">❌ 数据加载失败</div>`;
      });
  </script>
</body>
</html>
