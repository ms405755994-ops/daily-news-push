<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>今日新闻推送</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.6;
    }
    .news-item {
      border-bottom: 1px solid #ccc;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .news-title {
      font-size: 1.4em;
      font-weight: bold;
    }
    .news-summary {
      margin-top: 6px;
      color: #444;
    }
    .news-link {
      margin-top: 6px;
      color: #0066cc;
      text-decoration: none;
    }
    .news-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>今日全球新闻雷达</h1>
  <div id="news-container"></div>

  <script>
    fetch("/api/news")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("news-container");
        data.forEach((n, index) => {
          const div = document.createElement("div");
          div.className = "news-item";
          div.innerHTML = `
            <div class="news-title">${index+1}. ${n.title}</div>
            <div class="news-summary">${n.summary || ""}</div>
            <a class="news-link" href="${n.link}" target="_blank">阅读全文</a>
          `;
          container.appendChild(div);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("news-container").innerText = "无法获取新闻内容";
      });
  </script>
</body>
</html>
