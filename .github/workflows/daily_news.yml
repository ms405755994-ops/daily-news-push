name: 每日新闻推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install feedparser requests
      - run: python news_bot.py
        env:
          QYWX_WEBHOOK: ${{ secrets.QYWX_WEBHOOK }}
